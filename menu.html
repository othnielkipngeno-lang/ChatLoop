<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu - GreenWorld</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .menu-list { display: flex; flex-direction: column; gap: 5px; }
        .menu-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 15px; background: #fff; border-bottom: 1px solid #eee;
            cursor: pointer; transition: 0.2s;
        }
        .menu-item:hover { background: #f9f9f9; }
        .menu-item div { display: flex; align-items: center; gap: 15px; }
        .menu-item span.icon { font-size: 20px; width: 30px; text-align: center; }
        .logout-item { color: #d9534f; font-weight: bold; margin-top: 20px; border: none; border-radius: 10px; }
        
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #7cb342; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <div class="top-bar">
        <div onclick="goBack()" style="cursor:pointer; padding: 10px; font-size: 20px;">⬅️</div>
        <div style="font-weight:bold; flex:1; text-align:center; margin-right:40px;">Settings & Privacy</div>
    </div>

    <div class="content" style="background: transparent; box-shadow: none; padding: 0;">
    <div class="menu-list">
        
        <div class="menu-item" onclick="location.href='account-settings.html'">
    <div class="menu-link-group">
        <span class="menu-icon">⚙️</span>
        <span class="menu-text">Account Settings</span>
    </div>
    <span class="arrow">❯</span>
</div>

        <div class="menu-item" onclick="location.href='forum.html'">
            <div>
                <span class="icon">🌐</span> 
                Community Forum 
                <span style="background:#7cb342; color:white; font-size:9px; padding:2px 6px; border-radius:10px; margin-left:5px;">NEW</span>
            </div>
            <span>❯</span>
        </div>

        <div class="menu-item" onclick="location.href='notifications.html'">
    <div class="menu-link-group">
        <span class="menu-icon">🔔</span>
        <span class="menu-text">Notifications</span>
    </div>
    <span class="arrow">❯</span>
</div>

        <div class="menu-item">
            <div><span class="icon">🔒</span> Privacy & Security</div>
            <span>❯</span>
        </div>

        <div class="menu-item" onclick="location.href='help.html'">
    <div class="menu-icon-circle">🎧</div>
    <span>Help & Support</span>
</div>

        <div class="menu-item">
            <div><span class="icon">🌙</span> Dark Mode</div>
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <div class="menu-item logout-item" id="logout-btn">
            <div><span class="icon">🚪</span> Log Out</div>
        </div>

    </div>

    <div style="text-align:center; margin-top:30px; color:#999; font-size:12px;">
        GreenWorld v1.1.0<br>
        Made with ❤️ for ChatLoop
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
