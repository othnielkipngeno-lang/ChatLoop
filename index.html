<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChatLoop</title>
<style>
    body { font-family: Arial, sans-serif; margin:0; padding:0; background:#f0f2f5; }
    .container { max-width: 800px; margin:auto; padding:20px; }
    h2 { text-align:center; }
    input, button, select { padding:8px; margin:5px 0; width:100%; box-sizing:border-box; }
    button { cursor:pointer; }
    .error { color:red; margin-bottom:10px; }
    .profile { display:flex; gap:20px; margin-bottom:20px; }
    .profile img { width:100px; height:100px; border-radius:50%; object-fit:cover; }
    .profile-details { flex:1; }
    .friend, .notification, .search-result { padding:10px; border:1px solid #ccc; border-radius:5px; margin-bottom:5px; display:flex; justify-content:space-between; align-items:center; }
    .friend div, .notification div, .search-result div { display:flex; align-items:center; gap:10px; cursor:pointer; }
    #friend-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center; }
    #friend-modal .modal-content { background:#fff; padding:20px; border-radius:10px; max-width:300px; text-align:center; }
    .flex-row { display:flex; gap:10px; align-items:center; }
</style>
</head>
<body>

<div class="container">

    <!-- ================== LOGIN ================== -->
    <div id="login-section">
        <h2>Login</h2>
        <div class="error" id="login-error"></div>
        <input type="text" id="login-email" placeholder="Email">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn">Login</button>
        <p>Or <a href="#" id="show-signup">Sign Up</a></p>
    </div>

    <!-- ================== SIGNUP ================== -->
    <div id="signup-section" style="display:none;">
        <h2>Sign Up</h2>
        <div class="error" id="signup-error"></div>
        <input type="text" id="signup-email" placeholder="Email">
        <input type="password" id="signup-password" placeholder="Password">
        <input type="password" id="confirm-password" placeholder="Confirm Password">
        <button id="signup-btn">Sign Up</button>
        <p>Or <a href="#" id="show-login">Login</a></p>
    </div>

    <!-- ================== PROFILE ================== -->
    <div id="profile-section" style="display:none;">
        <h2>My Profile</h2>
        <div class="profile">
            <img id="profile-photo" src="default-photo.jpg">
            <div class="profile-details">
                <p id="profile-name">Name</p>
                <p id="profile-email">Email</p>
                <p id="profile-gender">Gender: </p>
                <p id="profile-friends">Friends: </p>
                <input type="text" id="edit-name" placeholder="Edit Name">
                <input type="text" id="edit-gender" placeholder="Edit Gender">
                <input type="file" id="edit-photo">
                <button id="save-profile">Save Profile</button>
            </div>
        </div>

        <!-- Friend Requests -->
        <h3>Friend Requests</h3>
        <div id="friend-requests"></div>

        <!-- Notifications -->
        <h3>Notifications</h3>
        <div id="notification-box"></div>

        <!-- Friends List -->
        <h3>Friends</h3>
        <div id="friends-container"></div>

        <!-- Search -->
        <h3>Search Friends</h3>
        <input type="text" id="friend-search" placeholder="Enter name or email">
        <button id="search-btn">Search</button>
        <div id="search-result"></div>
    </div>

</div>

<!-- Friend Modal -->
<div id="friend-modal">
    <div class="modal-content">
        <img id="modal-photo" src="" style="width:100px;height:100px;border-radius:50%;margin-bottom:10px;">
        <p id="modal-name"></p>
        <p id="modal-gender"></p>
        <p id="modal-friends-count"></p>
        <button id="close-modal">Close</button>
    </div>
</div>

<script>
// ================== DOM ELEMENTS ==================
const loginSection = document.getElementById('login-section');
const signupSection = document.getElementById('signup-section');
const profileSection = document.getElementById('profile-section');
const friendsContainer = document.getElementById('friends-container');

// Toggle login/signup
document.getElementById('show-signup').onclick = () => { loginSection.style.display='none'; signupSection.style.display='block'; };
document.getElementById('show-login').onclick = () => { signupSection.style.display='none'; loginSection.style.display='block'; };

// ================== LOCAL STORAGE ==================
let users = JSON.parse(localStorage.getItem('users')) || [];
let loggedInUser = localStorage.getItem('loggedInUser');
let currentUser = users.find(u => u.email === loggedInUser);

// ================== LOGIN ==================
document.getElementById('login-btn').onclick = () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const loginError = document.getElementById('login-error');

    if(email==='Admin' && password==='qwerty') {
        localStorage.setItem('loggedInUser','Admin'); location.reload(); return;
    }

    const user = users.find(u => u.email===email && u.password===password);
    if(!user) { loginError.textContent='Invalid credentials'; return; }
    localStorage.setItem('loggedInUser', email);
    location.reload();
};

// ================== SIGNUP ==================
document.getElementById('signup-btn').onclick = () => {
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const confirm = document.getElementById('confirm-password').value;
    const signupError = document.getElementById('signup-error');

    if(!email || !password || !confirm) { signupError.textContent='Please fill all fields'; return; }
    const emailRegex = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
    if(!emailRegex.test(email)) { signupError.textContent='Only @gmail.com allowed'; return; }
    if(password!==confirm){ signupError.textContent='Passwords do not match'; return; }
    if(users.some(u=>u.email===email)){ signupError.textContent='User exists'; return; }

    users.push({email,password,friends:[],friendRequests:[],name:'',gender:'',profilePhoto:''});
    localStorage.setItem('users',JSON.stringify(users));
    alert('Account created!'); loginSection.style.display='block'; signupSection.style.display='none';
};

// ================== PROFILE DISPLAY ==================
function showProfile() {
    if(!loggedInUser) return;
    loginSection.style.display='none';
    signupSection.style.display='none';
    profileSection.style.display='block';

    users = JSON.parse(localStorage.getItem('users')) || [];
    currentUser = users.find(u => u.email===loggedInUser);
    if(!currentUser) return;

    document.getElementById('profile-photo').src = currentUser.profilePhoto || 'default-photo.jpg';
    document.getElementById('profile-name').textContent = currentUser.name || currentUser.email;
    document.getElementById('profile-email').textContent = currentUser.email;
    document.getElementById('profile-gender').textContent = `Gender: ${currentUser.gender || 'Not set'}`;
    document.getElementById('profile-friends').textContent = `Friends: ${currentUser.friends?.length || 0}`;
    document.getElementById('edit-name').value = currentUser.name || '';
    document.getElementById('edit-gender').value = currentUser.gender || '';

    renderFriends();
    renderFriendRequests();
    renderNotifications();
}
showProfile();

// ================== SAVE PROFILE ==================
document.getElementById('save-profile').onclick = () => {
    currentUser.name = document.getElementById('edit-name').value;
    currentUser.gender = document.getElementById('edit-gender').value;
    const index = users.findIndex(u => u.email===loggedInUser);
    users[index] = currentUser;
    localStorage.setItem('users',JSON.stringify(users));
    alert('Profile updated!');
    showProfile();
};

// ================== PROFILE PHOTO ==================
document.getElementById('edit-photo').onchange = e => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = evt => {
        currentUser.profilePhoto = evt.target.result;
        document.getElementById('profile-photo').src = evt.target.result;
        localStorage.setItem('users',JSON.stringify(users));
    };
    reader.readAsDataURL(file);
};

// ================== FRIEND REQUESTS ==================
function renderFriendRequests() {
    const container = document.getElementById('friend-requests');
    container.innerHTML = '';
    if(currentUser.friendRequests?.length){
        currentUser.friendRequests.forEach(reqEmail=>{
            const reqUser = users.find(u=>u.email===reqEmail);
            const div = document.createElement('div'); div.className='friend';
            div.innerHTML = `<div>${reqUser?.name||reqEmail}</div>`;
            const btn = document.createElement('button'); btn.textContent='Accept';
            btn.onclick = () => {
                currentUser.friends.push(reqEmail);
                reqUser.friends.push(loggedInUser);
                currentUser.friendRequests = currentUser.friendRequests.filter(r=>r!==reqEmail);
                localStorage.setItem('users',JSON.stringify(users));
                showProfile();
            };
            div.appendChild(btn);
            container.appendChild(div);
        });
    } else container.innerHTML='<p>No requests</p>';
}

// ================== NOTIFICATIONS ==================
function renderNotifications() {
    const container = document.getElementById('notification-box');
    container.innerHTML='';
    if(currentUser.friendRequests?.length){
        currentUser.friendRequests.forEach(reqEmail=>{
            const sender = users.find(u=>u.email===reqEmail);
            const div = document.createElement('div'); div.className='notification';
            div.innerHTML = `<div><img src="${sender.profilePhoto||'default-photo.jpg'}" style="width:35px;height:35px;border-radius:50%;"><span>${sender.name||reqEmail}</span></div>`;
            const btn = document.createElement('button'); btn.textContent='Accept';
            btn.onclick = () => {
                currentUser.friends.push(reqEmail);
                sender.friends.push(loggedInUser);
                currentUser.friendRequests = currentUser.friendRequests.filter(r=>r!==reqEmail);
                localStorage.setItem('users',JSON.stringify(users));
                showProfile();
            };
            div.appendChild(btn);
            container.appendChild(div);
        });
    } else container.innerHTML='<p>No new requests</p>';
}

// ================== FRIENDS LIST ==================
function renderFriends() {
    friendsContainer.innerHTML='';
    if(currentUser.friends?.length){
        currentUser.friends.forEach(email=>{
            const friend = users.find(u=>u.email===email);
            const div = document.createElement('div'); div.className='friend';
            div.innerHTML = `<div><img src="${friend.profilePhoto||'default-photo.jpg'}" style="width:35px;height:35px;border-radius:50%;"><span>${friend.name||email}</span></div>`;
            div.onclick = () => showFriendDetails(email);
            friendsContainer.appendChild(div);
        });
    }
}

// ================== SEARCH ==================
document.getElementById('search-btn').onclick = () => {
    const query = document.getElementById('friend-search').value.trim().toLowerCase();
    const container = document.getElementById('search-result'); container.innerHTML='';
    if(!query) return alert('Enter a name or email');
    const foundUsers = users.filter(u=>(u.name?.toLowerCase().includes(query)||u.email.toLowerCase().includes(query)) && u.email!==loggedInUser);
    if(!foundUsers.length) return alert('No users found');

    foundUsers.forEach(u=>{
        const div = document.createElement('div'); div.className='search-result';
        const left = document.createElement('div'); left.innerHTML = `<img src="${u.profilePhoto||'default-photo.jpg'}" style="width:35px;height:35px;border-radius:50%;"><span>${u.name||u.email}</span>`;
        left.onclick = () => showFriendDetails(u.email);
        const btn = document.createElement('button'); btn.textContent='Add Friend';
        btn.onclick = () => sendFriendRequest(u.email);
        div.appendChild(left); div.appendChild(btn);
        container.appendChild(div);
    });
};

// ================== SEND FRIEND REQUEST ==================
function sendFriendRequest(email){
    const sender = users.find(u=>u.email===loggedInUser);
    const receiver = users.find(u=>u.email===email);
    if(!receiver) return alert('User not found');
    if(receiver.friends.includes(loggedInUser)) return alert('Already friends');
    if(receiver.friendRequests.includes(loggedInUser)) return alert('Request sent');
    receiver.friendRequests.push(loggedInUser);
    localStorage.setItem('users',JSON.stringify(users));
    alert('Friend request sent!');
    showProfile();
}

// ================== FRIEND DETAILS MODAL ==================
function showFriendDetails(email){
    const friend = users.find(u=>u.email===email);
    if(!friend) return alert('User not found');
    document.getElementById('modal-photo').src = friend.profilePhoto || 'https://via.placeholder.com/100';
    document.getElementById('modal-name').textContent = friend.name || friend.email;
    document.getElementById('modal-gender').textContent = `Gender: ${friend.gender || 'Not set'}`;
    document.getElementById('modal-friends-count').textContent = `Friends: ${friend.friends?.length||0}`;
    document.getElementById('friend-modal').style.display='flex';
}

// ================== CLOSE MODAL ==================
document.getElementById('close-modal').onclick = () => {
    document.getElementById('friend-modal').style.display='none';
};
</script>

</body>
</html>
